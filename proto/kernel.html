<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kardashev — noyau (prototype jetable)</title>
<style>
  /* ─────────── PROTOTYPE JETABLE ───────────
     But unique : SENTIR si répartir → bifurquer → graduer est amusant ~3-5 min.
     Pas de save, pas de méta, pas de polish. Tout est tunable en haut du <script>. */
  :root{ --bg:#0a0c14; --ink:#e8ecf6; --dim:#8a93ad; --haut:#6ea8ff; --large:#ffb86e; --ok:#74e0a3; --bad:#ff7a8a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:15px/1.5 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #app{ height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; position:relative; }
  .stage{ display:flex; flex-direction:column; align-items:center; gap:14px; transition:transform 1.6s cubic-bezier(.6,0,.2,1), opacity 1.6s; }
  /* la civ : un monolithe qui grandit en hauteur/largeur selon la répartition */
  .civWrap{ height:280px; display:flex; align-items:flex-end; }
  .civ{ width:60px; height:60px; border-radius:7px 7px 3px 3px;
    background:linear-gradient(180deg,#9ec3ff,#5b78c8);
    box-shadow:0 0 40px rgba(110,168,255,.35), inset 0 0 20px rgba(255,255,255,.15);
    transition:width .25s, height .25s, background .4s, box-shadow .4s; }
  .label{ color:var(--dim); font-size:13px; letter-spacing:.06em; text-transform:uppercase; }
  .stats{ display:flex; gap:26px; font-variant-numeric:tabular-nums; }
  .stat b{ font-size:22px; } .stat .h{ color:var(--haut); } .stat .l{ color:var(--large); }
  .panel{ width:min(560px,92vw); background:#121624; border:1px solid #232a40; border-radius:14px; padding:18px 20px; }
  .slider{ width:100%; margin:6px 0 2px; -webkit-appearance:none; appearance:none; height:8px; border-radius:8px;
    background:linear-gradient(90deg,var(--large),var(--haut)); outline:none; }
  .slider::-webkit-slider-thumb{ -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; cursor:grab; box-shadow:0 0 0 4px #0a0c14; }
  .slider::-moz-range-thumb{ width:22px; height:22px; border:none; border-radius:50%; background:#fff; cursor:grab; box-shadow:0 0 0 4px #0a0c14; }
  .splitRow{ display:flex; justify-content:space-between; font-size:13px; color:var(--dim); }
  .filter{ text-align:center; }
  .filter h2{ margin:.1em 0 .3em; font-size:16px; letter-spacing:.04em; }
  .bar{ height:12px; border-radius:8px; background:#1c2236; overflow:hidden; margin:10px 0; }
  .bar > i{ display:block; height:100%; width:0; background:var(--ok); transition:width .2s; }
  button{ font:inherit; color:#0a0c14; background:var(--ink); border:none; border-radius:10px; padding:11px 18px; cursor:pointer; font-weight:600; }
  button:disabled{ opacity:.35; cursor:not-allowed; }
  button.ghost{ background:transparent; color:var(--ink); border:1px solid #3a4360; }
  .choices{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px; }
  .choices button{ flex:1; min-width:200px; text-align:left; background:#1a2034; color:var(--ink); border:1px solid #2c3450; padding:14px 16px; }
  .choices button:hover{ border-color:#46527e; }
  .choices small{ display:block; color:var(--dim); font-weight:400; margin-top:4px; }
  .hint{ color:var(--dim); font-size:13px; text-align:center; }
  .flash{ animation:flash .5s; } @keyframes flash{ from{ box-shadow:0 0 90px var(--ok);} }
  /* ciel galactique révélé à la graduation */
  #sky{ position:absolute; inset:0; opacity:0; pointer-events:none; transition:opacity 1.6s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  #sky.show{ opacity:1; pointer-events:auto; }
  .starfield{ position:absolute; inset:0; }
  .star{ position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:.5; }
  .myStar{ width:14px; height:14px; border-radius:50%; background:radial-gradient(circle,#cfe0ff,#6ea8ff); box-shadow:0 0 24px 6px rgba(110,168,255,.7); }
  .big{ font-size:26px; font-weight:700; } .em{ color:var(--haut); }
</style>
</head>
<body>
<div id="app">
  <div class="stage" id="stage">
    <div class="label" id="era">Civilisation naissante</div>
    <div class="civWrap"><div class="civ" id="civ"></div></div>
    <div class="stats">
      <div class="stat">HAUTEUR <b class="h" id="vHaut">0</b></div>
      <div class="stat">LARGEUR <b class="l" id="vLarge">0</b></div>
    </div>

    <div class="panel">
      <div class="splitRow"><span>◀ Largeur (large · increvable)</span><span>Hauteur (haute · fragile) ▶</span></div>
      <input class="slider" id="split" type="range" min="0" max="100" value="50">
      <div class="hint">Tu ne cliques pas : l'énergie coule toute seule. Ton seul geste — <b>où elle coule</b>.</div>
    </div>

    <div class="panel filter" id="filterPanel">
      <div class="label">Prochain Grand Filtre</div>
      <h2 id="fTitle">—</h2>
      <div class="bar"><i id="fBar"></i></div>
      <div id="fStatus" class="hint">—</div>
      <div style="margin-top:12px"><button id="fBtn">Tenter le filtre</button></div>
      <div class="choices" id="branches" style="display:none"></div>
    </div>
  </div>

  <div id="sky">
    <div class="starfield" id="starfield"></div>
    <div class="big" style="z-index:1">Elle n'était qu'<span class="em">une étoile</span>.</div>
    <div style="z-index:1" class="hint" id="skyLine">Et voilà le ciel que tu possèdes maintenant.</div>
    <div class="myStar" style="z-index:1; margin:8px 0"></div>
    <div style="z-index:1" id="memLine" class="hint"></div>
    <button class="ghost" style="z-index:1; margin-top:10px" onclick="location.reload()">Recommencer</button>
  </div>
</div>

<script>
/* ─────────── TUNABLES (devine, puis sens, puis ajuste) ─────────── */
const E_RATE   = 4.0;      // énergie/seconde qui coule dans la civ
const TICK_MS  = 100;
const FILTERS  = [         // civ 1 = rampe : transparents (on apprend le verbe). La gauntlet recule → le dernier est dans le noir.
  { axis:'haut',  seuil:40,  hidden:false },
  { axis:'large', seuil:90,  hidden:false },
  { axis:'haut',  seuil:150, hidden:false },
];
/* à la graduation : pousser un filtre de plus DANS LE NOIR (caché) */
const PUSH = { axis:(Math.random()<.5?'haut':'large'), seuil:230, hidden:true };
const MEM = { safeK:1.0, pushWinK:1.6, pushFailK:0.5 }; // mémoire : casser = SOUS la ligne de base (0.5 < 1.0)

/* ─────────── ÉTAT ─────────── */
let haut=0, large=0, split=0.5, hMult=1, lMult=1;
let fi=0, phase='grow', pushing=false;
const $=id=>document.getElementById(id);

$('split').oninput = e => split = e.target.value/100;

function tick(){
  if(phase==='grow' || phase==='push'){
    const dt=TICK_MS/1000;
    haut  += E_RATE*dt*split*hMult;
    large += E_RATE*dt*(1-split)*lMult;
    render();
  }
}

function curFilter(){ return phase==='push' ? PUSH : FILTERS[fi]; }
function statOf(axis){ return axis==='haut'?haut:large; }

function render(){
  $('vHaut').textContent = Math.floor(haut);
  $('vLarge').textContent= Math.floor(large);
  // devenir visible : la forme épouse la répartition
  const w = 40 + Math.min(large,400)*0.5;
  const h = 40 + Math.min(haut ,400)*0.55;
  const c=$('civ'); c.style.width=w+'px'; c.style.height=h+'px';
  const tall = haut/(haut+large+1);
  c.style.background = `linear-gradient(180deg, hsl(${220-tall*40} 90% ${72-tall*8}%), hsl(${225-tall*30} 55% 52%))`;

  const f=curFilter();
  if(phase==='grow'||phase==='push'){
    const s=statOf(f.axis), ready=s>=f.seuil;
    if(f.hidden){
      $('fTitle').textContent='Le noir. Tu ignores ce qu\'il teste.';
      $('fBar').style.width = '100%'; $('fBar').style.background='#3a4360';
      $('fStatus').textContent='Tu ne sauras qu\'en tentant.';
    }else{
      $('fTitle').innerHTML = `teste la <b class="${f.axis==='haut'?'h':'l'}" style="color:var(--${f.axis})">${f.axis==='haut'?'HAUTEUR':'LARGEUR'}</b> — seuil ${f.seuil}`;
      $('fBar').style.width = Math.min(100, s/f.seuil*100)+'%';
      $('fBar').style.background = ready?'var(--ok)':'var(--haut)';
      $('fStatus').textContent = ready? 'Prête. Tu peux tenter.' : `${Math.floor(s)} / ${f.seuil}`;
    }
    $('fBtn').disabled=false;
  }
}

$('fBtn').onclick = ()=>{
  const f=curFilter(); const pass = statOf(f.axis) >= f.seuil;
  if(phase==='push'){ return resolvePush(pass); }
  if(!pass){ // civ 1 indulgente : pas de punition, on apprend qu'il faut être prête
    $('fStatus').textContent='Pas encore. Penche le flux et laisse couler.';
    $('civ').style.boxShadow='0 0 30px var(--bad)';
    setTimeout(()=>$('civ').style.boxShadow='',300);
    return;
  }
  $('civ').classList.add('flash'); setTimeout(()=>$('civ').classList.remove('flash'),500);
  offerBranches();
};

function offerBranches(){
  phase='branch'; $('fBtn').style.display='none';
  const box=$('branches'); box.style.display='flex';
  const opts = curFilter().axis==='haut'
    ? [ {n:'Flèche',  d:'plus haute, plus fragile',   h:1.5, l:0.85},
        {n:'Contrefort', d:'convertit vers la stabilité', h:0.9, l:1.3} ]
    : [ {n:'Plateau', d:'plus large, increvable',     h:0.85, l:1.5},
        {n:'Tour',    d:'érige depuis la base',         h:1.3, l:0.9} ];
  box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.innerHTML = `${o.n}<small>${o.d} · ×${o.h} haut / ×${o.l} large</small>`;
    b.onclick=()=>{ hMult*=o.h; lMult*=o.l; advance(); };
    box.appendChild(b);
  });
}

function advance(){
  $('branches').style.display='none'; $('fBtn').style.display='';
  fi++;
  if(fi >= FILTERS.length){ offerGraduation(); }
  else { phase='grow'; $('era').textContent = `Civilisation — palier ${fi+1}`; render(); }
}

function offerGraduation(){
  phase='gradChoice';
  $('fTitle').textContent='Elle a tout franchi. Et maintenant ?';
  $('fBar').style.width='100%'; $('fBar').style.background='var(--ok)';
  $('fStatus').textContent='';
  $('fBtn').style.display='none';
  const box=$('branches'); box.style.display='flex'; box.innerHTML='';
  const g1=document.createElement('button');
  g1.innerHTML=`Laisser graduer <small>sûr · elle rejoint ton ciel telle quelle</small>`;
  g1.onclick=()=>graduate('safe');
  const g2=document.createElement('button');
  g2.innerHTML=`Pousser dans le noir <small>risqué · un filtre caché de plus — peut se briser</small>`;
  g2.onclick=()=>{ box.style.display='none'; $('fBtn').style.display=''; phase='push'; $('era').textContent='Au-delà de la lumière…'; render(); };
  box.appendChild(g1); box.appendChild(g2);
}

function resolvePush(pass){
  if(pass){ graduate('pushWin'); }
  else { graduate('pushFail'); }
}

function graduate(kind){
  phase='done';
  const base = haut+large;
  let mem, line;
  if(kind==='safe'){      mem=Math.round(base*MEM.safeK);     line='Diplômée, intacte. Une lumière nette dans ton ciel.'; }
  else if(kind==='pushWin'){ mem=Math.round(base*MEM.pushWinK); line='Tu l\'as poussée et elle a tenu. Une étoile rare.'; }
  else {                  mem=Math.round(base*MEM.pushFailK);  line='Tu l\'as poussée trop loin. Elle s\'est brisée — il n\'en reste qu\'une lueur. <span class="em">Même ça enseigne.</span>'; }

  // ── le dézoom : la civ devient une étoile, le ciel se révèle ──
  $('stage').style.transform='scale(.04)'; $('stage').style.opacity='0';
  buildStarfield();
  setTimeout(()=>{
    $('sky').classList.add('show');
    $('skyLine').innerHTML = line;
    $('memLine').innerHTML = `Mémoire laissée : <b>${mem}</b>` + (kind==='pushFail'?' &nbsp;(sous la ligne de base — le prix du risque)':'');
  }, 1100);
}

function buildStarfield(){
  const sf=$('starfield'); let html='';
  for(let i=0;i<140;i++){
    const x=Math.random()*100, y=Math.random()*100, o=.2+Math.random()*.6, s=Math.random()<.1?2:1;
    html+=`<div class="star" style="left:${x}%;top:${y}%;opacity:${o};width:${s}px;height:${s}px"></div>`;
  }
  sf.innerHTML=html;
}

render();
setInterval(tick, TICK_MS);
</script>
</body>
</html>
