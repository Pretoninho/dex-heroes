<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dex Heroes — Idle Finance</title>
<style>
  :root {
    --bg: #0d1f17;
    --panel: #12281d;
    --panel-2: #18342695;
    --accent: #34d17a;     /* vert dollar */
    --accent-2: #ffd24d;   /* or */
    --text: #eafff4;
    --muted: #8fb7a3;
    --shadow: 0 6px 20px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% -10%, #16382a, var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    /* Supprime le double-tap zoom mobile (garde le pinch-zoom d'accessibilité) */
    touch-action: manipulation;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: .5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline { color: var(--muted); margin: 0 0 20px; font-size: 14px; text-align: center; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 20px;
    width: 100%;
    max-width: 820px;
  }
  @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid #1d3d2c;
  }

  /* Clicker side */
  .counter { text-align: center; }
  .cash {
    font-size: 38px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1.1;
  }
  .per-sec { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .bill-btn {
    margin: 18px auto 6px;
    width: 180px;
    height: 120px;
    border-radius: 14px;
    border: 2px solid #2e7d52;
    cursor: pointer;
    font-size: 64px;
    background: linear-gradient(160deg, #2f7d54, #1c5238);
    box-shadow: inset 0 -6px 14px rgba(0,0,0,.4), var(--shadow);
    transition: transform .06s ease;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .bill-btn:active { transform: scale(.94) rotate(-1deg); }
  .click-hint { color: var(--muted); font-size: 13px; }

  /* Floating +N */
  .float {
    position: fixed;
    pointer-events: none;
    font-weight: 700;
    color: var(--accent-2);
    animation: floatUp .9s ease-out forwards;
    z-index: 50;
  }
  @keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-50px); }
  }

  /* Dex progress */
  .dex-progress {
    margin: 14px 0 4px;
    font-size: 13px;
    color: var(--muted);
  }
  .bar {
    height: 8px;
    background: #0d2419;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 6px;
  }
  .bar > span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width .3s;
  }

  /* Dex / heroes */
  h2 { margin: 0 0 12px; font-size: 18px; }
  .hero {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color .15s, transform .05s;
    touch-action: manipulation;
  }
  .hero:hover { border-color: var(--accent); }
  .hero:active { transform: scale(.99); }
  .hero.locked { opacity: .5; cursor: not-allowed; }
  .hero .emoji { font-size: 30px; width: 40px; text-align: center; }
  .hero .info { flex: 1; }
  .hero .name { font-weight: 700; }
  .hero .desc { font-size: 12px; color: var(--muted); }
  .hero .right { text-align: right; }
  .hero .cost { font-weight: 700; color: var(--accent-2); }
  .hero .owned { font-size: 12px; color: var(--accent); }

  .controls { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
  .btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid #2a4d3a;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    touch-action: manipulation;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.danger:hover { border-color: #ff6b6b; color: #ff8a8a; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-2);
    border: 1px solid #2a4d3a;
    padding: 10px 18px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    backdrop-filter: blur(4px);
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <h1>💵 Dex Heroes</h1>
  <p class="tagline">Clique sur le billet, recrute des Héros et fais progresser ton Dex.<br>Ils génèrent du cash même quand tu n'es pas là.</p>

  <div class="layout">
    <!-- Clicker -->
    <div class="panel counter">
      <div class="cash" id="cashCount">$0</div>
      <div class="per-sec" id="perSec">$0 / sec</div>
      <button class="bill-btn" id="billBtn" aria-label="Gagner du cash">💵</button>
      <div class="click-hint">+$<span id="clickPower">1</span> par clic</div>

      <div class="dex-progress">
        Dex : <span id="dexCount">0</span>/<span id="dexTotal">0</span> Héros recrutés
        <div class="bar"><span id="dexBar"></span></div>
      </div>

      <div class="controls">
        <button class="btn" id="saveBtn">💾 Sauver</button>
        <button class="btn danger" id="resetBtn">🗑️ Réinitialiser</button>
      </div>
    </div>

    <!-- Dex -->
    <div class="panel">
      <h2>📒 Ton Dex</h2>
      <div id="dex"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  // --- Définition des Héros (générateurs) -------------------------------
  // baseCost: coût du 1er exemplaire | rate: $/sec par exemplaire
  // growth: multiplicateur de coût à chaque recrutement (1.15 = standard idle)
  // On commence avec 3 Héros — facile d'en ajouter d'autres ici.
  const HEROES = [
    { id: "trader",   name: "Le Trader",       emoji: "🧑‍💼", desc: "Scalpe le marché",        baseCost: 15,   rate: 0.1, growth: 1.15 },
    { id: "banquier", name: "Le Banquier",     emoji: "🏦",   desc: "Prête à intérêt",         baseCost: 100,  rate: 1,   growth: 1.15 },
    { id: "investo",  name: "L'Investisseur",  emoji: "📈",   desc: "Encaisse les dividendes", baseCost: 1100, rate: 8,   growth: 1.15 },
  ];

  const SAVE_KEY = "dexHeroesSave";

  // --- État --------------------------------------------------------------
  let state = {
    cash: 0,
    clickPower: 1,
    owned: {},          // { heroId: quantité }
    lastSeen: Date.now()
  };

  // --- Chargement / sauvegarde ------------------------------------------
  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      state = Object.assign(state, saved);
      state.owned = saved.owned || {};
      // Progression hors-ligne
      const elapsed = (Date.now() - (saved.lastSeen || Date.now())) / 1000;
      if (elapsed > 1) {
        const gained = perSecond() * elapsed;
        if (gained > 0) {
          state.cash += gained;
          setTimeout(() => toast(`Bon retour ! +$${fmt(gained)} gagnés hors-ligne`), 400);
        }
      }
    } catch (e) { console.warn("Sauvegarde illisible", e); }
  }

  function save() {
    state.lastSeen = Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  }

  // --- Calculs -----------------------------------------------------------
  function costOf(hero) {
    const n = state.owned[hero.id] || 0;
    return Math.ceil(hero.baseCost * Math.pow(hero.growth, n));
  }
  function perSecond() {
    return HEROES.reduce((sum, h) => sum + (state.owned[h.id] || 0) * h.rate, 0);
  }
  function dexUnlocked() {
    return HEROES.filter(h => (state.owned[h.id] || 0) > 0).length;
  }

  // --- Formatage des grands nombres -------------------------------------
  const UNITS = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp"];
  function fmt(n) {
    if (n < 1000) return (Math.floor(n * 100) / 100).toString();
    let tier = Math.floor(Math.log10(n) / 3);
    tier = Math.min(tier, UNITS.length - 1);
    const scaled = n / Math.pow(1000, tier);
    return scaled.toFixed(2) + UNITS[tier];
  }

  // --- Actions -----------------------------------------------------------
  function click(e) {
    state.cash += state.clickPower;
    spawnFloat(e, "+$" + state.clickPower);
    render();
  }

  function recruit(hero) {
    const cost = costOf(hero);
    if (state.cash < cost) { toast("Pas assez de cash !"); return; }
    const isNew = !(state.owned[hero.id] > 0);
    state.cash -= cost;
    state.owned[hero.id] = (state.owned[hero.id] || 0) + 1;
    if (isNew) toast(`${hero.emoji} ${hero.name} rejoint ton Dex !`);
    render();
    save();
  }

  function reset() {
    if (!confirm("Réinitialiser toute ta progression ?")) return;
    localStorage.removeItem(SAVE_KEY);
    state = { cash: 0, clickPower: 1, owned: {}, lastSeen: Date.now() };
    buildDex();
    render();
    toast("Partie réinitialisée");
  }

  // --- Effets visuels ----------------------------------------------------
  function spawnFloat(e, txt) {
    const el = document.createElement("div");
    el.className = "float";
    el.textContent = txt;
    el.style.left = (e.clientX - 10) + "px";
    el.style.top = (e.clientY - 20) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  let toastTimer;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
  }

  // --- Rendu -------------------------------------------------------------
  function buildDex() {
    const dex = document.getElementById("dex");
    dex.innerHTML = "";
    HEROES.forEach(hero => {
      const div = document.createElement("div");
      div.className = "hero";
      div.id = "hero-" + hero.id;
      div.innerHTML = `
        <div class="emoji">${hero.emoji}</div>
        <div class="info">
          <div class="name">${hero.name}</div>
          <div class="desc">${hero.desc} · +$${hero.rate}/sec</div>
        </div>
        <div class="right">
          <div class="cost" id="cost-${hero.id}"></div>
          <div class="owned" id="owned-${hero.id}"></div>
        </div>`;
      div.addEventListener("click", () => recruit(hero));
      dex.appendChild(div);
    });
    document.getElementById("dexTotal").textContent = HEROES.length;
  }

  function render() {
    document.getElementById("cashCount").textContent = "$" + fmt(state.cash);
    document.getElementById("perSec").textContent = "$" + fmt(perSecond()) + " / sec";
    document.getElementById("clickPower").textContent = state.clickPower;

    const unlocked = dexUnlocked();
    document.getElementById("dexCount").textContent = unlocked;
    document.getElementById("dexBar").style.width = (unlocked / HEROES.length * 100) + "%";

    HEROES.forEach(hero => {
      const cost = costOf(hero);
      const el = document.getElementById("hero-" + hero.id);
      document.getElementById("cost-" + hero.id).textContent = "$" + fmt(cost);
      const n = state.owned[hero.id] || 0;
      document.getElementById("owned-" + hero.id).textContent = n > 0 ? "Niv. " + n : "";
      el.classList.toggle("locked", state.cash < cost);
    });
  }

  // --- Boucle de jeu -----------------------------------------------------
  let lastTick = Date.now();
  function loop() {
    const now = Date.now();
    const dt = (now - lastTick) / 1000;
    lastTick = now;
    state.cash += perSecond() * dt;
    render();
  }

  // --- Démarrage ---------------------------------------------------------
  load();
  buildDex();
  render();
  document.getElementById("billBtn").addEventListener("click", click);
  document.getElementById("saveBtn").addEventListener("click", () => { save(); toast("Sauvegardé 💾"); });
  document.getElementById("resetBtn").addEventListener("click", reset);
  setInterval(loop, 100);     // boucle de production (10x/sec)
  setInterval(save, 15000);   // sauvegarde auto toutes les 15s
  window.addEventListener("beforeunload", save);
})();
</script>
</body>
</html>
