<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dex Heroes — Cash Flow</title>
<style>
  :root {
    --bg: #0d1f17;
    --panel: #12281d;
    --panel-2: #18342695;
    --accent: #34d17a;     /* vert dollar */
    --accent-2: #ffd24d;   /* or */
    --text: #eafff4;
    --muted: #8fb7a3;
    --shadow: 0 6px 20px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% -10%, #16382a, var(--bg));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    touch-action: manipulation;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: .5px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline { color: var(--muted); margin: 0 0 20px; font-size: 14px; text-align: center; }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }
  @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid #1d3d2c;
  }

  /* Clicker side */
  .counter { text-align: center; }
  .cash { font-size: 38px; font-weight: 800; color: var(--accent); line-height: 1.1; }
  .per-sec { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .bill-btn {
    margin: 18px auto 6px;
    width: 180px;
    height: 120px;
    border-radius: 14px;
    border: 2px solid #2e7d52;
    cursor: pointer;
    font-size: 64px;
    background: linear-gradient(160deg, #2f7d54, #1c5238);
    box-shadow: inset 0 -6px 14px rgba(0,0,0,.4), var(--shadow);
    transition: transform .06s ease;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .bill-btn:active { transform: scale(.94) rotate(-1deg); }
  .click-hint { color: var(--muted); font-size: 13px; }
  .stat { color: var(--muted); font-size: 13px; margin-top: 14px; }
  .stat b { color: var(--accent); }

  .float {
    position: fixed;
    pointer-events: none;
    font-weight: 700;
    color: var(--accent-2);
    animation: floatUp .9s ease-out forwards;
    z-index: 50;
  }
  @keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-50px); }
  }

  /* Cash-flow graph */
  h2 { margin: 0 0 4px; font-size: 18px; }
  .panel .hint { color: var(--muted); font-size: 12px; margin: 0 0 10px; }

  .graph {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 78vh;
    margin: 6px auto 0;
    container-type: size;   /* active les unités cqmin pour les nœuds */
  }
  .graph svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .link {
    fill: none;
    stroke: #234534;
    stroke-width: 3;
    transition: stroke .3s;
  }
  .link.active {
    stroke: var(--accent);
    filter: drop-shadow(0 0 3px var(--accent));
    stroke-dasharray: 6 6;
    animation: flow 1s linear infinite;
  }
  @keyframes flow { to { stroke-dashoffset: -12; } }

  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    width: clamp(56px, 20cqmin, 96px);
    background: var(--panel-2);
    border: 2px solid #2a4d3a;
    border-radius: 12px;
    padding: clamp(2px, 0.9cqmin, 5px) clamp(2px, 1cqmin, 5px);
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: border-color .15s, transform .05s, opacity .2s;
    touch-action: manipulation;
  }
  .node:active { transform: translate(-50%, -50%) scale(.97); }
  .node .nemoji { font-size: clamp(14px, 4.6cqmin, 21px); line-height: 1; }
  .node .nname { font-weight: 700; font-size: clamp(8px, 2.8cqmin, 11.5px); margin-top: 1px; }
  .node .ninfo { font-size: clamp(7px, 2.4cqmin, 10px); margin-top: 2px; line-height: 1.15; }
  .node .ncost { color: var(--accent-2); }
  .node .nlevel { color: var(--accent); }

  .node.source {
    border-color: var(--accent);
    cursor: default;
    background: radial-gradient(circle at 50% 35%, #2f7d54, #18342695);
    box-shadow: 0 0 18px rgba(52,209,122,.5);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .node.source:active { transform: translate(-50%, -50%); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 14px rgba(52,209,122,.35); }
    50%      { box-shadow: 0 0 24px rgba(52,209,122,.65); }
  }
  .node.connected { border-color: var(--accent); box-shadow: 0 0 12px rgba(52,209,122,.35); }
  .node.connectable { border-color: var(--accent-2); }
  .node.locked { opacity: .4; cursor: not-allowed; filter: grayscale(.6); }

  .controls { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
  .btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid #2a4d3a;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    touch-action: manipulation;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.danger:hover { border-color: #ff6b6b; color: #ff8a8a; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-2);
    border: 1px solid #2a4d3a;
    padding: 10px 18px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    backdrop-filter: blur(4px);
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <h1>💵 Dex Heroes</h1>
  <p class="tagline">Construis ton <b>cash flow</b> : connecte des actifs à la source pour faire grossir le flux de cash.</p>

  <div class="layout">
    <!-- Source / clic -->
    <div class="panel counter">
      <div class="cash" id="cashCount">$0</div>
      <div class="per-sec" id="perSec">$0 / sec</div>
      <button class="bill-btn" id="billBtn" aria-label="Gagner du cash">💵</button>
      <div class="click-hint">+$<span id="clickPower">1</span> par clic</div>
      <div class="stat">Actifs connectés : <b id="connCount">0</b> / <span id="connTotal">0</span></div>
      <div class="controls">
        <button class="btn" id="saveBtn">💾 Sauver</button>
        <button class="btn danger" id="resetBtn">🗑️ Réinitialiser</button>
      </div>
    </div>

    <!-- Graphe de cash flow -->
    <div class="panel">
      <h2>🔗 Cash Flow</h2>
      <p class="hint">Clique un actif débloqué pour le <b>connecter</b>, reclique pour l'<b>améliorer</b>.</p>
      <div class="graph" id="graph">
        <svg id="links" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  // --- Graphe d'actifs ---------------------------------------------------
  // x/y : position en % dans le graphe | parent : nœud amont requis
  // baseCost : coût de connexion | rate : +$/sec ajoutés par niveau
  // growth : multiplicateur de coût à chaque amélioration
  // Graphe tentaculaire : la Source au centre nourrit des bras d'actifs qui
  // rayonnent tout autour. Chaque bras part à un angle donné et enchaîne des
  // modules (paliers). Ajouter un bras ou un module = éditer ARMS / RADII.
  const SOURCE = { id: "source", name: "Source", emoji: "💵", source: true };
  const RADII = [26, 46];          // distance au centre, par palier
  const GROWTH = 1.18;
  const ARMS = [
    { angle: 270, tiers: [ { name: "Banque",     emoji: "🏦", cost: 50,    rate: 0.5 }, { name: "Crédit",       emoji: "💳", cost: 1500,   rate: 9   } ] },
    { angle: 330, tiers: [ { name: "Bourse",     emoji: "📈", cost: 120,   rate: 1   }, { name: "Crypto",       emoji: "🪙", cost: 4000,   rate: 18  } ] },
    { angle: 30,  tiers: [ { name: "Immobilier", emoji: "🏠", cost: 300,   rate: 2   }, { name: "Promotion",    emoji: "🏗️", cost: 9000,   rate: 35  } ] },
    { angle: 90,  tiers: [ { name: "Industrie",  emoji: "🏭", cost: 700,   rate: 3.5 }, { name: "Commerce",     emoji: "🚢", cost: 20000,  rate: 70  } ] },
    { angle: 150, tiers: [ { name: "Startup",    emoji: "💼", cost: 1600,  rate: 6   }, { name: "Licorne",      emoji: "🦄", cost: 45000,  rate: 140 } ] },
    { angle: 210, tiers: [ { name: "Énergie",    emoji: "🛢️", cost: 4000,  rate: 12  }, { name: "Renouvelable", emoji: "⚡", cost: 100000, rate: 280 } ] },
  ];

  // Génère les nœuds positionnés en étoile autour de la source (centre 50,50).
  const NODES = [ Object.assign({ x: 50, y: 50 }, SOURCE) ];
  ARMS.forEach((arm, ai) => {
    const rad = arm.angle * Math.PI / 180;
    arm.tiers.forEach((t, ti) => {
      NODES.push({
        id: "a" + ai + "t" + ti,
        name: t.name, emoji: t.emoji,
        x: 50 + RADII[ti] * Math.cos(rad),
        y: 50 + RADII[ti] * Math.sin(rad),
        parent: ti === 0 ? "source" : "a" + ai + "t" + (ti - 1),
        baseCost: t.cost, rate: t.rate, growth: GROWTH
      });
    });
  });
  const NODE = Object.fromEntries(NODES.map(n => [n.id, n]));
  const ASSETS = NODES.filter(n => !n.source);

  const SAVE_KEY = "dexHeroesSave";

  // --- État --------------------------------------------------------------
  let state = {
    cash: 0,
    clickPower: 1,
    levels: {},          // { nodeId: niveau } (0 = non connecté)
    lastSeen: Date.now()
  };

  // --- Helpers de graphe -------------------------------------------------
  function levelOf(node) { return state.levels[node.id] || 0; }
  function isConnected(node) { return node.source || levelOf(node) > 0; }
  function isUnlocked(node) { return node.source || isConnected(NODE[node.parent]); }
  function costOf(node) { return Math.ceil(node.baseCost * Math.pow(node.growth, levelOf(node))); }
  function perSecond() { return ASSETS.reduce((s, n) => s + levelOf(n) * n.rate, 0); }
  function connectedCount() { return ASSETS.filter(isConnected).length; }

  // --- Chargement / sauvegarde ------------------------------------------
  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      state = Object.assign(state, saved);
      state.levels = saved.levels || {};
      const elapsed = (Date.now() - (saved.lastSeen || Date.now())) / 1000;
      if (elapsed > 1) {
        const gained = perSecond() * elapsed;
        if (gained > 0) {
          state.cash += gained;
          setTimeout(() => toast(`Bon retour ! +$${fmt(gained)} gagnés hors-ligne`), 400);
        }
      }
    } catch (e) { console.warn("Sauvegarde illisible", e); }
  }
  function save() {
    state.lastSeen = Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  }

  // --- Formatage ---------------------------------------------------------
  const UNITS = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp"];
  function fmt(n) {
    if (n < 1000) return (Math.floor(n * 100) / 100).toString();
    let tier = Math.min(Math.floor(Math.log10(n) / 3), UNITS.length - 1);
    return (n / Math.pow(1000, tier)).toFixed(2) + UNITS[tier];
  }

  // --- Actions -----------------------------------------------------------
  function click(e) {
    state.cash += state.clickPower;
    spawnFloat(e, "+$" + state.clickPower);
    render();
  }

  function interact(node) {
    if (node.source) return;
    if (!isUnlocked(node)) {
      toast(`🔒 Connecte d'abord ${NODE[node.parent].emoji} ${NODE[node.parent].name}`);
      return;
    }
    const cost = costOf(node);
    if (state.cash < cost) { toast("Pas assez de cash !"); return; }
    const firstTime = levelOf(node) === 0;
    state.cash -= cost;
    state.levels[node.id] = levelOf(node) + 1;
    toast(firstTime
      ? `${node.emoji} ${node.name} connecté ! +$${node.rate}/s`
      : `${node.emoji} ${node.name} amélioré → niv. ${state.levels[node.id]}`);
    render();
    save();
  }

  function reset() {
    if (!confirm("Réinitialiser toute ta progression ?")) return;
    localStorage.removeItem(SAVE_KEY);
    state = { cash: 0, clickPower: 1, levels: {}, lastSeen: Date.now() };
    render();
    toast("Partie réinitialisée");
  }

  // --- Effets ------------------------------------------------------------
  function spawnFloat(e, txt) {
    const el = document.createElement("div");
    el.className = "float";
    el.textContent = txt;
    el.style.left = (e.clientX - 10) + "px";
    el.style.top = (e.clientY - 20) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }
  let toastTimer;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
  }

  // --- Construction du graphe (une fois) --------------------------------
  function buildGraph() {
    const svg = document.getElementById("links");
    const graph = document.getElementById("graph");
    // Liens (parent -> nœud)
    ASSETS.forEach((n, i) => {
      const p = NODE[n.parent];
      const mx = (p.x + n.x) / 2, my = (p.y + n.y) / 2;
      const dx = n.x - p.x, dy = n.y - p.y;
      const len = Math.hypot(dx, dy) || 1;
      const bend = (i % 2 ? 1 : -1) * 5;           // courbure « tentacule »
      const cx = mx - dy / len * bend, cy = my + dx / len * bend;
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${p.x} ${p.y} Q ${cx} ${cy} ${n.x} ${n.y}`);
      path.setAttribute("class", "link");
      path.setAttribute("vector-effect", "non-scaling-stroke");
      path.id = "link-" + n.id;
      svg.appendChild(path);
    });
    // Nœuds
    NODES.forEach(n => {
      const div = document.createElement("div");
      div.className = "node";
      div.id = "node-" + n.id;
      div.style.left = n.x + "%";
      div.style.top = n.y + "%";
      div.innerHTML = `
        <div class="nemoji">${n.emoji}</div>
        <div class="nname">${n.name}</div>
        <div class="ninfo" id="info-${n.id}"></div>`;
      if (!n.source) div.addEventListener("click", () => interact(n));
      graph.appendChild(div);
    });
    document.getElementById("connTotal").textContent = ASSETS.length;
  }

  // --- Rendu -------------------------------------------------------------
  function render() {
    document.getElementById("cashCount").textContent = "$" + fmt(state.cash);
    document.getElementById("perSec").textContent = "$" + fmt(perSecond()) + " / sec";
    document.getElementById("clickPower").textContent = state.clickPower;
    document.getElementById("connCount").textContent = connectedCount();

    NODES.forEach(n => {
      const div = document.getElementById("node-" + n.id);
      const info = document.getElementById("info-" + n.id);
      if (n.source) {
        div.className = "node source";
        info.innerHTML = `<span class="nlevel">+$${state.clickPower}/clic</span>`;
        return;
      }
      const connected = isConnected(n);
      const unlocked = isUnlocked(n);
      const cost = costOf(n);

      div.classList.toggle("connected", connected);
      div.classList.toggle("connectable", unlocked && !connected);
      div.classList.toggle("locked", !unlocked);
      div.classList.remove("source");

      if (!unlocked) {
        info.innerHTML = `🔒 verrouillé`;
      } else if (!connected) {
        info.innerHTML = `<span class="ncost">Connecter $${fmt(cost)}</span>`;
      } else {
        info.innerHTML =
          `<span class="nlevel">niv.${levelOf(n)} · +$${fmt(levelOf(n) * n.rate)}/s</span><br>` +
          `<span class="ncost">↑ $${fmt(cost)}</span>`;
      }

      const link = document.getElementById("link-" + n.id);
      link.classList.toggle("active", connected);
    });
  }

  // --- Boucle ------------------------------------------------------------
  let lastTick = Date.now();
  function loop() {
    const now = Date.now();
    state.cash += perSecond() * (now - lastTick) / 1000;
    lastTick = now;
    render();
  }

  // --- Démarrage ---------------------------------------------------------
  load();
  buildGraph();
  render();
  document.getElementById("billBtn").addEventListener("click", click);
  document.getElementById("saveBtn").addEventListener("click", () => { save(); toast("Sauvegardé 💾"); });
  document.getElementById("resetBtn").addEventListener("click", reset);
  setInterval(loop, 100);
  setInterval(save, 15000);
  window.addEventListener("beforeunload", save);
})();
</script>
</body>
</html>
